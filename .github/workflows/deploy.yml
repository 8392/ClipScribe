name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check API_URL variable
        run: |
          if [ -z "${{ vars.API_URL }}" ]; then
            echo "::warning::GitHub Variable API_URL is not set. Set it in repo Settings → Secrets and variables → Actions → Variables"
            echo "Example: https://clipscribe-api.onrender.com"
          fi

      - uses: actions/configure-pages@v4

      - run: bun install
      - run: bun run --filter @clipscribe/shared build

      - name: Build frontend
        run: bun run --filter @clipscribe/web build
        env:
          VITE_API_BASE: ${{ vars.API_URL }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not set, skip API redeploy"
          fi
