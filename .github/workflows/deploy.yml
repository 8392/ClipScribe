name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check API_URL
        run: |
          if [ -z "${{ vars.API_URL }}" ]; then
            echo "::warning::未设置 GitHub Variable API_URL，前端将无法连接后端 API"
            echo "请在 Settings → Secrets and variables → Actions → Variables 添加 API_URL"
          fi

      - run: bun install
      - run: bun run --filter @clipscribe/shared build

      - name: Build frontend
        run: bun run --filter @clipscribe/web build
        env:
          VITE_API_BASE: ${{ vars.API_URL }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Add .nojekyll for GitHub Pages
        run: touch apps/web/dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/dist
          publish_branch: gh-pages
          force_orphan: true

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not set, skip"
          fi
