# https://render.com/deploy?repo=https://github.com/8392/ClipScribe
services:
  - type: web
    name: clipscribe-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: TEMP_DIR
        value: /tmp/clipscribe
      - key: LLM_PROVIDER
        value: qwen
      - key: LLM_MODEL
        value: qwen-turbo
      - key: SUMMARY_LANGUAGE
        value: zh
      - key: SUBTITLE_LANG
        value: zh
      - key: CORS_ORIGINS
        value: https://8392.github.io
      - key: DASHSCOPE_API_KEY
        sync: false
